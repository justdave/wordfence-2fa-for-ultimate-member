on:
  release:
    types:
      - published
name: Build & Release
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v4
    - name: Get Version Number
      uses: WyriHaximus/github-action-get-previous-tag@v1
      id: lasttag
    #- name: Post to WordPress.org Plugin Directory
    #  uses: 10up/action-wordpress-plugin-deploy@stable
    #  env:
    #    SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
    #    SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
    - name: Create Zip file
      run: /bin/bash ${PWD}/.github/bin/build-package.sh "${{ steps.lasttag.outputs.tag }}"
    - name: Post to GitHub Release
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        omitBodyDuringUpdate: true
        omitNameDuringUpdate: true
        omitPrereleaseDuringUpdate: true
        tag: ${{ steps.lasttag.outputs.tag }}
        artifacts: "../wordfence-2fa-for-ultimate-member-${{ steps.lasttag.outputs.tag }}.zip"
        token: ${{ secrets.GITHUB_TOKEN }}